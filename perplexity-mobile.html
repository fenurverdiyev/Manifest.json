<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Perplexity AI - Mobil</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Mobile-First Design */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            line-height: 1.5;
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.95);
        }

        /* Header - Compact for mobile */
        .header {
            padding: 1rem;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .logo i {
            font-size: 1.5rem;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .tagline {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 0.3rem;
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        /* Welcome Section */
        .welcome-section {
            text-align: center;
            padding: 2rem 0;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .welcome-content h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 600;
        }

        .welcome-content p {
            font-size: 1rem;
            color: #666;
            margin-bottom: 1rem;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            display: none;
            margin-bottom: 1rem;
        }

        .chat-container.active {
            display: block;
        }

        .messages {
            max-height: calc(100vh - 250px);
            overflow-y: auto;
            padding: 0.5rem 0;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .messages::-webkit-scrollbar {
            display: none;
        }

        /* Messages - Mobile optimized */
        .message {
            margin-bottom: 1rem;
            animation: slideUp 0.3s ease-out;
        }

        .message.user {
            text-align: right;
        }

        .message.ai {
            text-align: left;
        }

        .message-content {
            display: inline-block;
            max-width: 85%;
            padding: 0.8rem 1rem;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 0.95rem;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-content {
            background: #f8f9fa;
            color: #333;
            border: 1px solid #e9ecef;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 0.7rem;
            color: #666;
            margin-top: 0.3rem;
            opacity: 0.7;
        }

        /* Input Section - Fixed bottom */
        .input-section {
            position: sticky;
            bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid #e9ecef;
            padding: 1rem;
            padding-bottom: max(1rem, env(safe-area-inset-bottom));
        }

        .input-container {
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
            margin-bottom: 0.8rem;
        }

        #userInput {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 2px solid #e9ecef;
            border-radius: 20px;
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
            min-height: 44px;
            max-height: 120px;
        }

        #userInput:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }

        .send-button {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .send-button:active {
            transform: scale(0.95);
        }

        .send-button:disabled {
            opacity: 0.6;
        }

        .input-actions {
            display: flex;
            justify-content: center;
        }

        .action-button {
            padding: 0.6rem 1rem;
            border: 1px solid #ddd;
            border-radius: 15px;
            background: white;
            color: #666;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .action-button:active {
            background: #f0f0f0;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            text-align: center;
            color: white;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        /* Animations */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Error styles */
        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 0.8rem;
            border-radius: 10px;
            margin: 0.5rem 0;
            text-align: center;
            font-size: 0.9rem;
        }

        /* Dark theme support */
        @media (prefers-color-scheme: dark) {
            .message.ai .message-content {
                background: #2d3748;
                color: #e2e8f0;
                border-color: #4a5568;
            }
        }

        /* PWA styles */
        .install-prompt {
            background: #4299e1;
            color: white;
            padding: 0.8rem;
            text-align: center;
            font-size: 0.9rem;
            cursor: pointer;
            display: none;
        }

        .install-prompt.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="install-prompt" id="installPrompt">
        📱 Tətbiqi ana səhifəyə əlavə edin
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-search"></i>
                <h1>Perplexity</h1>
            </div>
            <div class="tagline">AI ilə danışın</div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Welcome Section -->
            <div class="welcome-section" id="welcomeSection">
                <div class="welcome-content">
                    <h2>Sualınızı yazın</h2>
                    <p>AI sizə kömək etməyə hazırdır</p>
                </div>
            </div>

            <!-- Chat Container -->
            <div class="chat-container" id="chatContainer">
                <div class="messages" id="messages"></div>
            </div>
        </main>

        <!-- Input Section -->
        <div class="input-section">
            <div class="input-container">
                <textarea 
                    id="userInput" 
                    placeholder="Mesajınızı yazın..." 
                    rows="1"
                    maxlength="1000"
                ></textarea>
                <button id="sendButton" class="send-button">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div class="input-actions">
                <button id="clearButton" class="action-button">
                    <i class="fas fa-trash"></i>
                    Təmizlə
                </button>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>AI cavabı hazırlayır...</p>
        </div>
    </div>

    <script>
        // Gemini API Configuration
        const GEMINI_API_KEY = 'AIzaSyAE98X1gnvNLaTu-oBJXVBraAY_vij61sY';
        const GEMINI_API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent';

        // DOM Elements
        const welcomeSection = document.getElementById('welcomeSection');
        const chatContainer = document.getElementById('chatContainer');
        const messagesContainer = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');
        const clearButton = document.getElementById('clearButton');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const installPrompt = document.getElementById('installPrompt');

        // Chat State
        let conversationHistory = [];
        let isGenerating = false;

        // Initialize the application
        document.addEventListener('DOMContentLoaded', function() {
            setupEventListeners();
            adjustTextareaHeight();
            setupPWA();
            console.log('📱 Perplexity AI - Mobil versiya yükləndi');
        });

        // Setup Event Listeners
        function setupEventListeners() {
            sendButton.addEventListener('click', handleSendMessage);
            
            userInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSendMessage();
                }
            });
            
            userInput.addEventListener('input', adjustTextareaHeight);
            clearButton.addEventListener('click', clearConversation);
            
            // Touch events for better mobile experience
            sendButton.addEventListener('touchstart', function(e) {
                e.preventDefault();
                this.style.transform = 'scale(0.95)';
            });
            
            sendButton.addEventListener('touchend', function(e) {
                e.preventDefault();
                this.style.transform = 'scale(1)';
                handleSendMessage();
            });
            
            userInput.focus();
        }

        // PWA Setup
        function setupPWA() {
            // Check if app can be installed
            let deferredPrompt;
            
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                installPrompt.classList.add('show');
            });
            
            installPrompt.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    deferredPrompt = null;
                    installPrompt.classList.remove('show');
                }
            });
        }

        // Handle sending a message
        async function handleSendMessage() {
            const message = userInput.value.trim();
            
            if (!message || isGenerating) return;
            
            addMessage(message, 'user');
            userInput.value = '';
            adjustTextareaHeight();
            hideWelcomeSection();
            
            await generateAIResponse(message);
        }

        // Add message to chat
        function addMessage(content, type = 'user') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            
            if (type === 'ai') {
                messageContent.innerHTML = formatMessage(content);
            } else {
                messageContent.textContent = content;
            }
            
            const messageTime = document.createElement('div');
            messageTime.className = 'message-time';
            messageTime.textContent = new Date().toLocaleTimeString('az-AZ', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            
            messageDiv.appendChild(messageContent);
            messageDiv.appendChild(messageTime);
            messagesContainer.appendChild(messageDiv);
            
            // Smooth scroll to bottom
            setTimeout(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 100);
            
            conversationHistory.push({
                role: type === 'user' ? 'user' : 'model',
                parts: [{ text: content }]
            });
        }

        // Generate AI response
        async function generateAIResponse(userMessage) {
            setGenerating(true);
            
            try {
                const response = await fetch(`${GEMINI_API_URL}?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [{
                            role: 'user',
                            parts: [{ text: userMessage }]
                        }],
                        generationConfig: {
                            temperature: 0.7,
                            topK: 40,
                            topP: 0.95,
                            maxOutputTokens: 1024,
                        },
                        safetySettings: [
                            {
                                category: "HARM_CATEGORY_HARASSMENT",
                                threshold: "BLOCK_MEDIUM_AND_ABOVE"
                            },
                            {
                                category: "HARM_CATEGORY_HATE_SPEECH",
                                threshold: "BLOCK_MEDIUM_AND_ABOVE"
                            },
                            {
                                category: "HARM_CATEGORY_SEXUALLY_EXPLICIT",
                                threshold: "BLOCK_MEDIUM_AND_ABOVE"
                            },
                            {
                                category: "HARM_CATEGORY_DANGEROUS_CONTENT",
                                threshold: "BLOCK_MEDIUM_AND_ABUSE"
                            }
                        ]
                    })
                });

                if (!response.ok) {
                    throw new Error(`API xətası: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    addMessage(aiResponse, 'ai');
                } else {
                    throw new Error('Cavab alınmadı');
                }
                
            } catch (error) {
                console.error('Xəta:', error);
                
                let errorMessage = 'Üzr istəyirik, xəta baş verdi. ';
                if (error.message.includes('403')) {
                    errorMessage += 'API key problemi.';
                } else if (error.message.includes('429')) {
                    errorMessage += 'Çox sorğu, gözləyin.';
                } else {
                    errorMessage += 'Yenidən cəhd edin.';
                }
                
                addMessage(errorMessage, 'ai');
            } finally {
                setGenerating(false);
            }
        }

        // Format message
        function formatMessage(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code style="background:#f0f0f0;padding:2px 4px;border-radius:3px;">$1</code>')
                .replace(/\n/g, '<br>')
                .replace(/```([\s\S]*?)```/g, '<pre style="background:#f8f9fa;padding:8px;border-radius:6px;overflow-x:auto;"><code>$1</code></pre>');
        }

        // Set generating state
        function setGenerating(generating) {
            isGenerating = generating;
            
            if (generating) {
                loadingOverlay.classList.add('active');
                sendButton.disabled = true;
                userInput.disabled = true;
            } else {
                loadingOverlay.classList.remove('active');
                sendButton.disabled = false;
                userInput.disabled = false;
                userInput.focus();
            }
        }

        // Hide welcome section
        function hideWelcomeSection() {
            welcomeSection.style.display = 'none';
            chatContainer.classList.add('active');
        }

        // Show welcome section
        function showWelcomeSection() {
            welcomeSection.style.display = 'flex';
            chatContainer.classList.remove('active');
        }

        // Clear conversation
        function clearConversation() {
            if (conversationHistory.length === 0) return;
            
            if (confirm('Danışığı təmizləmək istəyirsiniz?')) {
                conversationHistory = [];
                messagesContainer.innerHTML = '';
                showWelcomeSection();
                userInput.focus();
            }
        }

        // Auto-resize textarea
        function adjustTextareaHeight() {
            userInput.style.height = 'auto';
            userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
        }

        // Prevent zoom on input focus (iOS)
        userInput.addEventListener('focus', function() {
            if (window.innerWidth < 768) {
                this.style.fontSize = '16px';
            }
        });

        // Network status
        window.addEventListener('offline', () => {
            if (isGenerating) {
                setGenerating(false);
                addMessage('İnternet bağlantısı kəsildi.', 'ai');
            }
        });
    </script>
</body>
</html>
